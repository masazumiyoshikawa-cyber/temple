<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法要 参座予約</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&family=Noto+Serif+SC:wght@300;400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#f7f4ef;--paper-warm:#ede8df;--card:#fff;
  --ink:#2a2520;--ink-mid:#6b6058;--ink-faint:#a89f96;
  --border:rgba(42,37,32,0.1);--border-mid:rgba(42,37,32,0.18);
  --gold:#8b7355;--gold-light:#e8dece;--gold-dark:#6b5840;
  --danger:#8b3a3a;--radius:2px;
}
body{font-family:'Noto Sans JP','Noto Sans SC',sans-serif;font-weight:300;background:var(--paper);color:var(--ink);min-height:100vh;line-height:1.8;}

/* LANG SWITCHER */
.lang-bar{background:rgba(0,0,0,0.25);display:flex;justify-content:flex-end;padding:6px 1.5rem;gap:4px;}
.lang-btn{padding:3px 10px;background:none;border:1px solid rgba(255,255,255,0.25);border-radius:1px;color:rgba(255,255,255,0.5);font-size:0.68rem;cursor:pointer;letter-spacing:0.06em;transition:all 0.18s;font-family:inherit;}
.lang-btn:hover{border-color:rgba(255,255,255,0.55);color:rgba(255,255,255,0.8);}
.lang-btn.active{border-color:var(--gold);color:var(--gold-light);background:rgba(139,115,85,0.18);}

header{background:var(--ink);padding:1.5rem 2rem 1.75rem;text-align:center;}
.header-mon{width:44px;height:44px;margin:0 auto 1rem;display:block;}
header h1{font-family:'Noto Serif JP','Noto Serif SC',serif;font-weight:400;font-size:clamp(1rem,3vw,1.35rem);color:rgba(255,255,255,0.88);letter-spacing:0.25em;margin-bottom:0.3rem;}
.header-sub{font-size:0.72rem;color:rgba(255,255,255,0.38);letter-spacing:0.18em;}
.header-period{margin-top:0.9rem;font-size:0.78rem;color:rgba(200,175,130,0.8);letter-spacing:0.15em;font-family:'Noto Serif JP','Noto Serif SC',serif;}

nav{background:var(--ink);border-top:1px solid rgba(255,255,255,0.07);display:flex;justify-content:center;}
.nav-item{padding:0.7rem 1.8rem;font-size:0.72rem;color:rgba(255,255,255,0.38);cursor:pointer;letter-spacing:0.15em;border-bottom:1.5px solid transparent;transition:all 0.2s;}
.nav-item:hover{color:rgba(255,255,255,0.65);}
.nav-item.active{color:rgba(200,175,130,0.9);border-bottom-color:var(--gold);}

.panel{display:none;}.panel.active{display:block;}
.wrap{max-width:680px;margin:0 auto;padding:2.5rem 1.5rem;}

.sec-head{text-align:center;margin-bottom:2rem;}
.sec-title{font-family:'Noto Serif JP','Noto Serif SC',serif;font-weight:400;font-size:0.95rem;letter-spacing:0.22em;color:var(--ink);margin-bottom:0.7rem;}
.sec-rule{height:1px;background:var(--border-mid);position:relative;margin:0 auto;max-width:220px;}
.sec-rule::after{content:'◆';position:absolute;left:50%;transform:translateX(-50%) translateY(-50%);background:var(--paper);padding:0 8px;font-size:7px;color:var(--gold);}

.month-label{font-size:0.7rem;color:var(--ink-faint);letter-spacing:0.12em;margin-bottom:0.75rem;padding-left:2px;}
.notice-box{background:var(--paper-warm);border:1px solid rgba(139,115,85,0.3);border-left:3px solid var(--gold);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;}
.notice-title{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.75rem;color:var(--gold-dark);letter-spacing:0.12em;margin-bottom:0.6rem;}
.notice-list{list-style:none;display:flex;flex-direction:column;gap:0.5rem;}
.notice-list li{font-size:0.78rem;color:var(--ink-mid);line-height:1.75;padding-left:1em;position:relative;}
.notice-list li::before{content:'*';position:absolute;left:0;color:var(--gold);}
.notice-list a{color:var(--gold-dark);text-decoration:underline;text-underline-offset:2px;}
.temple-tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:1px solid var(--border-mid);}
.temple-tab{padding:0.6rem 1.5rem;font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.78rem;letter-spacing:0.15em;color:var(--ink-faint);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.18s;}
.temple-tab:hover{color:var(--ink-mid);}
.temple-tab.active{color:var(--gold-dark);border-bottom-color:var(--gold);}

.events-grid{display:flex;flex-direction:column;gap:7px;margin-bottom:1.75rem;}
.event-card{display:flex;align-items:stretch;background:var(--card);border:1px solid var(--border-mid);border-radius:var(--radius);cursor:pointer;transition:border-color 0.18s,background 0.18s;overflow:hidden;}
.event-card:hover{border-color:var(--gold);}
.event-card.selected{border-color:var(--gold);background:var(--gold-light);}
.event-card.past{opacity:0.38;cursor:not-allowed;pointer-events:none;}
.event-card.past .event-date-col{background:var(--border);}
.event-card.past .event-name{color:var(--ink-faint);}
.event-card.past .check-mark{display:none;}
.event-date-col{width:62px;flex-shrink:0;background:var(--paper-warm);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;border-right:1px solid var(--border);transition:background 0.18s;}
.event-card.selected .event-date-col{background:rgba(139,115,85,0.14);}
.event-date-day{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:1.35rem;line-height:1;color:var(--ink);}
.event-date-wd{font-size:0.6rem;color:var(--ink-faint);letter-spacing:0.06em;margin-top:3px;}
.event-date-wd.sat{color:#4a6080;}.event-date-wd.sun{color:#7a3a30;}
.event-body{flex:1;padding:10px 13px;}
.event-name{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.88rem;color:var(--ink);letter-spacing:0.08em;}
.event-meta{font-size:0.7rem;color:var(--ink-mid);margin-top:3px;}
.event-right{display:flex;align-items:center;padding:10px 13px;}
.check-mark{width:19px;height:19px;border-radius:50%;border:1.5px solid var(--border-mid);display:flex;align-items:center;justify-content:center;transition:all 0.18s;}
.event-card.selected .check-mark{background:var(--gold);border-color:var(--gold);}
.check-mark svg{opacity:0;transition:opacity 0.15s;}
.event-card.selected .check-mark svg{opacity:1;}

.sel-summary{background:var(--ink);color:rgba(255,255,255,0.78);padding:11px 16px;border-radius:var(--radius);font-size:0.76rem;letter-spacing:0.06em;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.sel-summary.hidden{display:none;}
.sel-count em{font-style:normal;font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:1.05rem;color:rgba(200,175,130,0.9);}

.form-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;}
.form-section-title{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.75rem;color:var(--ink-mid);letter-spacing:0.15em;margin-bottom:1.1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:0.72rem;color:var(--ink-mid);letter-spacing:0.08em;margin-bottom:5px;}
.req{color:var(--gold);margin-left:2px;}
input[type=text],input[type=email],select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--paper);color:var(--ink);font-family:'Noto Sans JP','Noto Sans SC',sans-serif;font-weight:300;font-size:0.85rem;transition:border-color 0.2s,box-shadow 0.2s;outline:none;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(139,115,85,0.1);background:var(--card);}
textarea{resize:vertical;min-height:68px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){.form-row{grid-template-columns:1fr;}}

.err{color:var(--danger);font-size:0.75rem;margin-bottom:10px;display:none;}
.submit-btn{width:100%;padding:13px;background:var(--ink);color:rgba(255,255,255,0.85);border:none;border-radius:var(--radius);font-family:'Noto Serif JP','Noto Serif SC',serif;font-weight:400;font-size:0.85rem;letter-spacing:0.2em;cursor:pointer;transition:background 0.2s;}
.submit-btn:hover{background:#3d3530;}

.confirm-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;text-align:center;display:none;}
.confirm-block.vis{display:block;}
.confirm-icon{width:40px;height:40px;margin:0 auto 1rem;}
.confirm-title{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.95rem;letter-spacing:0.18em;margin-bottom:0.5rem;}
.confirm-name{font-size:0.82rem;color:var(--ink-mid);}
.confirm-events{margin-top:1rem;text-align:left;background:var(--paper-warm);padding:12px 16px;border-radius:var(--radius);}
.confirm-event-item{font-size:0.76rem;color:var(--ink-mid);padding:3px 0;letter-spacing:0.04em;}
.confirm-event-item::before{content:'◇ ';color:var(--gold);}
.reset-btn{margin-top:1.5rem;padding:8px 24px;background:none;border:1px solid var(--border-mid);border-radius:var(--radius);cursor:pointer;font-family:'Noto Sans JP','Noto Sans SC',sans-serif;font-size:0.75rem;letter-spacing:0.1em;color:var(--ink-mid);transition:border-color 0.2s;}
.reset-btn:hover{border-color:var(--gold);}

.list-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem;}
.filter-btn{padding:5px 13px;border:1px solid var(--border-mid);border-radius:var(--radius);background:none;font-family:'Noto Sans JP','Noto Sans SC',sans-serif;font-size:0.7rem;letter-spacing:0.06em;color:var(--ink-mid);cursor:pointer;transition:all 0.18s;}
.filter-btn:hover{border-color:var(--gold);}
.filter-btn.active{background:var(--ink);color:rgba(255,255,255,0.8);border-color:var(--ink);}
.att-group{margin-bottom:1.5rem;}
.att-group.past-group{opacity:0.35;}
.att-group-label{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.78rem;color:var(--ink-mid);letter-spacing:0.12em;padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.attendee-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);}
.att-num{font-size:0.68rem;color:var(--ink-faint);min-width:18px;text-align:right;}
.att-avatar{width:30px;height:30px;border-radius:50%;background:var(--gold-light);color:var(--gold-dark);display:flex;align-items:center;justify-content:center;font-size:0.68rem;flex-shrink:0;}
.att-info{flex:1;min-width:0;}
.att-name{font-size:0.85rem;}
.att-sub{font-size:0.68rem;color:var(--ink-faint);}
.empty{text-align:center;padding:3rem;color:var(--ink-faint);font-size:0.78rem;letter-spacing:0.12em;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:2rem;}
.stat{background:var(--card);border:1px solid var(--border);padding:1rem;text-align:center;}
.stat-n{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:1.8rem;color:var(--ink);line-height:1;}
.stat-l{font-size:0.65rem;color:var(--ink-faint);letter-spacing:0.08em;margin-top:4px;}
.adm-event-section{margin-bottom:1.5rem;}
.adm-event-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--paper-warm);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;}
.adm-event-name{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.8rem;letter-spacing:0.08em;}
.adm-event-count{font-size:0.72rem;color:var(--ink-mid);}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.78rem;}
th{text-align:left;padding:7px 10px;font-size:0.65rem;letter-spacing:0.08em;color:var(--ink-faint);border-bottom:1px solid var(--border-mid);font-weight:400;}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:var(--paper-warm);}
.del-btn{background:none;border:1px solid rgba(139,58,58,0.3);color:var(--danger);padding:3px 9px;border-radius:1px;font-size:0.65rem;cursor:pointer;font-family:inherit;letter-spacing:0.04em;transition:all 0.18s;}
.del-btn:hover{background:rgba(139,58,58,0.07);}

.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ink);color:rgba(255,255,255,0.82);padding:11px 16px;border-radius:var(--radius);font-size:0.75rem;letter-spacing:0.06em;box-shadow:0 6px 24px rgba(0,0,0,0.2);display:flex;align-items:center;gap:9px;transform:translateY(60px);opacity:0;transition:all 0.3s cubic-bezier(.34,1.56,.64,1);z-index:999;max-width:300px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;}

/* ── MOBILE ── */
@media(max-width:600px){
  .lang-bar{padding:6px 1rem;}
  .lang-btn{padding:4px 10px;font-size:0.7rem;}
  header{padding:1.25rem 1rem 1.5rem;}
  .header-mon{width:36px;height:36px;margin-bottom:0.75rem;}
  header h1{font-size:1rem;letter-spacing:0.15em;}
  .header-sub{font-size:0.68rem;letter-spacing:0.1em;}
  .header-period{font-size:0.72rem;}
  nav{justify-content:stretch;}
  .nav-item{flex:1;text-align:center;padding:0.75rem 0.5rem;font-size:0.68rem;letter-spacing:0.06em;}
  .wrap{padding:1.5rem 1rem;}
  .sec-title{font-size:0.85rem;letter-spacing:0.14em;}
  .temple-tab{padding:0.55rem 1rem;font-size:0.72rem;letter-spacing:0.08em;}
  .event-date-col{width:52px;}
  .event-date-day{font-size:1.15rem;}
  .event-body{padding:9px 10px;}
  .event-name{font-size:0.82rem;}
  .event-meta{font-size:0.66rem;}
  .event-right{padding:9px 10px;}
  .sel-summary{flex-direction:column;align-items:flex-start;gap:4px;padding:10px 14px;}
  .form-section{padding:1.25rem 1rem;}
  input[type=text],input[type=email],select,textarea{font-size:1rem;}  /* iOSズーム防止 */
  .submit-btn{font-size:0.82rem;padding:15px;letter-spacing:0.12em;}
  .confirm-block{padding:2rem 1.25rem;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .stat-n{font-size:1.5rem;}
  table{font-size:0.72rem;}
  th,td{padding:6px 8px;}
  .toast{left:1rem;right:1rem;bottom:1rem;max-width:none;}
  /* 管理者パスワードオーバーレイ */
  #adminOverlay > div{width:calc(100% - 3rem);padding:1.75rem 1.25rem;}
}
</style>
</head>
<body>

<!-- LANG BAR -->
<div style="background:var(--ink);">
  <div id="month-nav" style="display:flex;justify-content:center;align-items:center;gap:0;border-bottom:1px solid rgba(255,255,255,0.07);padding:6px 0;"></div>
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('ja')">日本語</button>
    <button class="lang-btn" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" onclick="setLang('en')">English</button>
  </div>
</div>

<header>
  <svg class="header-mon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="20" stroke="rgba(200,175,130,0.45)" stroke-width="0.7"/>
    <circle cx="22" cy="22" r="14" stroke="rgba(200,175,130,0.45)" stroke-width="0.7"/>
    <circle cx="22" cy="22" r="3.5" fill="rgba(200,175,130,0.55)"/>
    <line x1="22" y1="2" x2="22" y2="8" stroke="rgba(200,175,130,0.55)" stroke-width="0.9"/>
    <line x1="22" y1="36" x2="22" y2="42" stroke="rgba(200,175,130,0.55)" stroke-width="0.9"/>
    <line x1="2" y1="22" x2="8" y2="22" stroke="rgba(200,175,130,0.55)" stroke-width="0.9"/>
    <line x1="36" y1="22" x2="42" y2="22" stroke="rgba(200,175,130,0.55)" stroke-width="0.9"/>
    <line x1="6" y1="6" x2="9.9" y2="9.9" stroke="rgba(200,175,130,0.35)" stroke-width="0.9"/>
    <line x1="34.1" y1="34.1" x2="38" y2="38" stroke="rgba(200,175,130,0.35)" stroke-width="0.9"/>
    <line x1="6" y1="38" x2="9.9" y2="34.1" stroke="rgba(200,175,130,0.35)" stroke-width="0.9"/>
    <line x1="34.1" y1="9.9" x2="38" y2="6" stroke="rgba(200,175,130,0.35)" stroke-width="0.9"/>
  </svg>
  <h1 id="hdr-title"></h1>
  <div class="header-sub">中京本部 / 名古屋支部</div>
  <div class="header-period" id="hdr-period"></div>
</header>

<nav>
  <div class="nav-item active" onclick="switchTab('form')" id="nav-form"></div>
  <div class="nav-item" onclick="switchTab('list')" id="nav-list"></div>
  <div class="nav-item" onclick="switchTab('admin')" id="nav-admin"></div>
</nav>

<!-- ADMIN LOGIN OVERLAY -->
<div id="adminOverlay" style="display:none;position:fixed;inset:0;background:rgba(26,22,18,0.72);z-index:200;align-items:center;justify-content:center;">
  <div style="background:var(--card);border:1px solid var(--border-mid);border-radius:var(--radius);padding:2rem;width:320px;max-width:calc(100vw - 2rem);text-align:center;">
    <div style="font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.88rem;letter-spacing:0.18em;color:var(--ink);margin-bottom:1.25rem;" id="overlay-title">管理者ログイン</div>

    <!-- モード切替タブ -->
    <div style="display:flex;border:1px solid var(--border-mid);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem;">
      <button id="mode-general" onclick="setLoginMode('general')" style="flex:1;padding:7px;font-size:0.72rem;border:none;cursor:pointer;background:var(--ink);color:rgba(255,255,255,0.85);font-family:inherit;letter-spacing:0.06em;">一般管理者</button>
      <button id="mode-super" onclick="setLoginMode('super')" style="flex:1;padding:7px;font-size:0.72rem;border:none;cursor:pointer;background:none;color:var(--ink-mid);font-family:inherit;letter-spacing:0.06em;">スーパーユーザー</button>
    </div>

    <!-- 一般管理者：パスワードのみ -->
    <div id="login-general">
      <div class="form-group" style="text-align:left;">
        <label style="font-size:0.72rem;color:var(--ink-mid);">パスワード</label>
        <input type="password" id="adminPwInput" style="width:100%;padding:9px 12px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--paper);color:var(--ink);font-size:1rem;outline:none;letter-spacing:0.1em;" placeholder="••••••" onkeydown="if(event.key==='Enter')confirmAdminLogin()">
      </div>
    </div>

    <!-- スーパーユーザー：メール＋パスワード -->
    <div id="login-super" style="display:none;">
      <div class="form-group" style="text-align:left;margin-bottom:0.75rem;">
        <label style="font-size:0.72rem;color:var(--ink-mid);">メールアドレス</label>
        <input type="email" id="adminEmailInput" style="width:100%;padding:9px 12px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--paper);color:var(--ink);font-size:1rem;outline:none;" placeholder="admin@example.com">
      </div>
      <div class="form-group" style="text-align:left;">
        <label style="font-size:0.72rem;color:var(--ink-mid);">パスワード</label>
        <input type="password" id="adminSuperPwInput" style="width:100%;padding:9px 12px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--paper);color:var(--ink);font-size:1rem;outline:none;letter-spacing:0.1em;" placeholder="••••••" onkeydown="if(event.key==='Enter')confirmAdminLogin()">
      </div>
    </div>

    <div id="overlay-err" style="color:var(--danger);font-size:0.72rem;margin-top:6px;min-height:1rem;text-align:left;"></div>
    <div style="display:flex;gap:8px;margin-top:1rem;">
      <button onclick="cancelAdminLogin()" style="flex:1;padding:9px;background:none;border:1px solid var(--border-mid);border-radius:var(--radius);cursor:pointer;font-size:0.78rem;color:var(--ink-mid);font-family:inherit;">キャンセル</button>
      <button onclick="confirmAdminLogin()" style="flex:1;padding:9px;background:var(--ink);color:rgba(255,255,255,0.85);border:none;border-radius:var(--radius);cursor:pointer;font-size:0.78rem;font-family:inherit;">ログイン</button>
    </div>
  </div>
</div>

<!-- PASSWORD CHANGE MODAL -->
<div id="pwChangeModal" style="display:none;position:fixed;inset:0;background:rgba(26,22,18,0.72);z-index:200;align-items:center;justify-content:center;">
  <div style="background:var(--card);border:1px solid var(--border-mid);border-radius:var(--radius);padding:2rem;width:340px;max-width:calc(100vw - 2rem);">

// ── EVENTS ──
function isPast(ev) {
  // 上部の YEAR / MONTH 定数を使用
  const dayNum = parseInt(String(ev.day));
  if (!dayNum) return false;
  const evDate = new Date(YEAR, MONTH - 1, dayNum);
  // 日本時間（JST = UTC+9）で今日の日付を取得
  const nowJST = new Date(new Date().getTime() + 9 * 60 * 60 * 1000);
  const today  = new Date(nowJST.getUTCFullYear(), nowJST.getUTCMonth(), nowJST.getUTCDate());
  return evDate <= today;
}

function renderEvents() {
  ['t1','t2'].forEach(tid => {
    const grid = document.getElementById('grid-' + tid);
    grid.innerHTML = '';
    TEMPLES[tid].events.forEach(ev => {
      const isSel = selected.has(ev.id);
      const past  = isPast(ev);
      const wdStr = wd(ev);
      const wdClass = ev.wd === 6 ? 'sat' : ev.wd === 0 ? 'sun' : '';
      const card = document.createElement('div');
      card.className = 'event-card' + (isSel ? ' selected' : '') + (past ? ' past' : '');
      card.innerHTML = `
        <div class="event-date-col">
          <div class="event-date-day">${ev.day}</div>
          <div class="event-date-wd ${wdClass}">${wdStr}</div>
        </div>
        <div class="event-body">
          <div class="event-name">${ev.name[currentLang] || ev.name.ja}</div>
          <div class="event-meta">${ev.time}</div>
        </div>
        <div class="event-right">
          <div class="check-mark">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>`;
      if (!past) card.addEventListener('click', () => toggleEvent(ev.id));
      grid.appendChild(card);
    });
  });
  const n = selected.size;
  const n1 = [...selected].filter(id => id.startsWith('t1')).length;
  const n2 = [...selected].filter(id => id.startsWith('t2')).length;
  document.getElementById('selCount').textContent = n;
  const parts = [];
  if (n1) parts.push('中京本部 ' + n1);
  if (n2) parts.push('名古屋支部 ' + n2);
  document.getElementById('selBreakdown').textContent = parts.join(' / ');
  document.getElementById('selSummary').classList.toggle('hidden', n === 0);
}

function toggleEvent(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  renderEvents();
}

// ── SUBMIT ──
function submitForm() {
  const L = I18N[currentLang];
  if (selected.size === 0) { showErr(L.errSelect); return; }
  const last = document.getElementById('lastName').value.trim();
  const first = document.getElementById('firstName').value.trim();
  const email = document.getElementById('email').value.trim();
  const lang = document.getElementById('language').value;
  if (!last || !first) { showErr(L.errName); return; }
  if (!email || !email.includes('@')) { showErr(L.errEmail); return; }
  if (!lang) { showErr(L.errLang); return; }
  document.getElementById('errMsg').style.display = 'none';
  const now = new Date();
  const b = {
    id: Date.now(),
    lastName: last, firstName: first,
    name: currentLang === 'en' ? first + ' ' + last : last + ' ' + first,
    email, language: lang,
    notes: document.getElementById('notes').value.trim(),
    eventIds: [...selected],
    at: now.toLocaleString(currentLang === 'en' ? 'en-US' : currentLang === 'zh' ? 'zh-CN' : 'ja-JP')
  };
  // 同じメールアドレスの既存予約を削除して上書き
  const isUpdate = bookings.some(bk => bk.email === email);
  bookings = bookings.filter(bk => bk.email !== email);
  bookings.push(b);
  const tname = {t1:'中京本部', t2:'名古屋支部'};
  const evLines = b.eventIds.map(id => {
    const ev = ALL_EVENTS.find(e => e.id === id);
    return tname[id.slice(0,2)] + ' ' + ev.day + (wd(ev) ? '（' + wd(ev) + '）' : '') + ' ' + (ev.name[currentLang] || ev.name.ja);
  });
  saveToDb(b, evLines, isUpdate);
  document.getElementById('formWrap').style.display = 'none';
  document.getElementById('confirmBlock').classList.add('vis');
  document.getElementById('confirmName').textContent = b.name + L.honorific;
  document.getElementById('confirmEvents').innerHTML = evLines.map(l => '<div class="confirm-event-item">' + l + '</div>').join('');
  showToast(b.name + L.honorific + '  ' + b.eventIds.length + ' ' + L.toastSuffix);
  sendConfirmEmail(b, evLines, isUpdate);
  renderEvents();
}

          + TEMPLES[tid].name.slice(-2) + ' ' + ev.day + '日 ' + (ev.name[currentLang]||ev.name.ja) + '</button>'
        ).join('')
      ).join('');

  const wrap = document.getElementById('attList');
  wrap.innerHTML = '';
  const empty = document.getElementById('listEmpty');

  if (!bookings.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  if (listFilter === 'all') {
    // 寺ごと・法要ごとにグループ表示
    let hasAny = false;
    ['t1','t2'].forEach(tid => {
      TEMPLES[tid].events.forEach(ev => {
        const evB = bookings.filter(b => b.eventIds && b.eventIds.includes(ev.id));
        if (!evB.length) return;
        hasAny = true;
        const past = isPast(ev);
        const g = document.createElement('div');
        g.className = 'att-group' + (past ? ' past-group' : '');
        g.innerHTML = '<div class="att-group-label">'
          + TEMPLES[tid].name + ' — '
          + ev.day + (wd(ev) ? '（' + wd(ev) + '）' : '') + ' '
          + (ev.name[currentLang]||ev.name.ja)
          + ' — ' + evB.length + '名</div>';
        evB.forEach((b, i) => g.appendChild(makeAttItem(b, i)));
        wrap.appendChild(g);
      });
    });
    // eventIdsが空（旧データ）はまとめて末尾に表示
    const legacy = bookings.filter(b => !b.eventIds || !b.eventIds.length);
    if (legacy.length) {
      const g = document.createElement('div');
      g.className = 'att-group';
      g.innerHTML = '<div class="att-group-label">その他 — ' + legacy.length + '名</div>';
      legacy.forEach((b, i) => g.appendChild(makeAttItem(b, i)));
      wrap.appendChild(g);
    }
  } else {
    const filtered = bookings.filter(b => b.eventIds && b.eventIds.includes(listFilter));
    if (!filtered.length) { empty.style.display = 'block'; return; }
    filtered.forEach((b, i) => wrap.appendChild(makeAttItem(b, i)));
  }

      <div class="att-sub">${b.language||'─'}</div>

  return d;
}

// SHA-256ハッシュ（Web Crypto API）
async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function confirmAdminLogin() {
  const errEl = document.getElementById('overlay-err');
  errEl.textContent = '';

  if (currentLoginMode === 'general') {
    // ── 一般管理者：パスワードをSHA-256してSupabaseのapp_configと照合 ──
    const pw = document.getElementById('adminPwInput').value;
    if (!pw) { errEl.textContent = 'パスワードを入力してください。'; return; }
    try {
      const hash = await sha256(pw.trim().normalize('NFC'));
      const res  = await fetch(SUPABASE_URL + '/rest/v1/app_config?key=eq.admin_password_hash&select=value', {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY },
      });
      const data = await res.json();
      if (!data.length || data[0].value !== hash) {
        errEl.textContent = 'パスワードが正しくありません。';
        document.getElementById('adminPwInput').value = '';
        return;
      }
      isAdminAuthed = true;
      isSuperUser   = false;
      document.getElementById('adminOverlay').style.display = 'none';
      if (pendingTab) { _doSwitchTab(pendingTab); pendingTab = null; }
    } catch(e) {
      errEl.textContent = 'ネットワークエラーが発生しました。';
    }

  } else {
    // ── スーパーユーザー：Supabase Auth ──
    const email = document.getElementById('adminEmailInput').value.trim();
    const pw    = document.getElementById('adminSuperPwInput').value;
    if (!email || !pw) { errEl.textContent = 'メールアドレスとパスワードを入力してください。'; return; }
    try {
      const res  = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pw }),
      });
      const data = await res.json();
      if (!res.ok || !data.access_token) {
        errEl.textContent = 'メールアドレスまたはパスワードが正しくありません。';
        document.getElementById('adminSuperPwInput').value = '';
        return;
      }
      supabaseSession = data;
      isAdminAuthed = true;
      isSuperUser   = true;
      document.getElementById('adminOverlay').style.display = 'none';
      if (pendingTab) { _doSwitchTab(pendingTab); pendingTab = null; }
    } catch(e) {
      errEl.textContent = 'ネットワークエラーが発生しました。';
    }
  }
}

function cancelAdminLogin() {
  document.getElementById('adminOverlay').style.display = 'none';
  pendingTab = null;
}

  isAdminAuthed = false;

function closePwChangeModal() {
  document.getElementById('pwChangeModal').style.display = 'none';
}

async function submitPwChange() {
  const newPw  = document.getElementById('pwNewInput').value;
  const confPw = document.getElementById('pwConfirmInput').value;
  const errEl  = document.getElementById('pwchange-err');
  if (newPw.length < 6) { errEl.textContent = 'パスワードは6文字以上にしてください。'; return; }
  if (newPw !== confPw)  { errEl.textContent = 'パスワードが一致しません。'; return; }

  try {
    const hash = await sha256(newPw);
    // app_config の admin_password_hash を更新
    const res = await fetch(SUPABASE_URL + '/rest/v1/app_config?key=eq.admin_password_hash', {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + (supabaseSession?.access_token || SUPABASE_KEY),
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({ value: hash }),
    });
    if (!res.ok) { errEl.textContent = 'パスワードの変更に失敗しました。'; return; }
    closePwChangeModal();
    showToast('一般管理者のパスワードを変更しました');
  } catch(e) {
    errEl.textContent = 'ネットワークエラーが発生しました。';
  }
}

// ── EXCEL DOWNLOAD ──
function downloadExcel() {
  if (!bookings.length) { showToast('予約データがありません'); return; }

  const FONT = 'Meiryo UI';
  const wb = XLSX.utils.book_new();
  const ws = {};

  // ヘッダー定義（日付・曜日・精舎・時間・法要名・名前・言語・コメント）
  const headers = ['日付', '曜日', '精舎', '時間', '法要名', '名前', '言語', 'コメント'];
  const WD_JA = ['日','月','火','水','木','金','土'];

  // 寺・法要ごとに参座者を集計
  const rows = [];
  const allEventsOrdered = [...TEMPLES.t1.events, ...TEMPLES.t2.events];

  allEventsOrdered.forEach(ev => {
    const tname = ev.id.startsWith('t1') ? '中京本部' : '名古屋支部';
    const dayStr = ev.day + '日';
    const wdStr  = ev.wd !== null && ev.wd !== undefined ? WD_JA[ev.wd] : '';
    const timeStr = ev.time || '';
    const evName  = ev.name.ja;
    const pastEv  = isPast(ev);
    const attendees = bookings
      .filter(b => b.eventIds && b.eventIds.includes(ev.id))
      .sort((a, b) => (a.language || '').localeCompare(b.language || '', 'ja'));
    if (!attendees.length) return;
    attendees.forEach((b, i) => {
      rows.push({
        dayStr, wdStr, tname, timeStr, evName,
        name: b.name,
        language: b.language || '',
        notes: b.notes || '',
        isFirst: i === 0,
        isLast: i === attendees.length - 1,
        pastEv,
      });
    });
  });

  if (!rows.length) { showToast('参座者データがありません'); return; }

  // セルデータを書き込む
  const R_START = 1;
  const COL = { day: 0, wd: 1, temple: 2, time: 3, ev: 4, name: 5, lang: 6, notes: 7 };

  // ヘッダー
  headers.forEach((h, c) => {
    const addr = XLSX.utils.encode_cell({r: 0, c});
    ws[addr] = {
      v: h, t: 's',
      s: {
        font: { name: FONT, bold: true, sz: 11 },
        fill: { fgColor: { rgb: 'F2EDE5' } },
        alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
        border: {
          top:    { style: 'medium', color: { rgb: '2A2520' } },
          bottom: { style: 'medium', color: { rgb: '2A2520' } },
          left:   { style: 'medium', color: { rgb: '2A2520' } },
          right:  { style: 'medium', color: { rgb: '2A2520' } },
        }
      }
    };
  });

  // データ行
  const merges = [];
  rows.forEach((row, i) => {
    const r = R_START + i;
    const bottomStyle = row.isLast ? 'medium' : 'thin';
    const bottomColor = row.isLast ? '2A2520' : 'C8B89A';
    const greyFill = row.pastEv ? 'EEEEEE' : null;
    const greyFont = row.pastEv ? '999999' : null;

    const baseBorder = (isLeft, isRight) => ({
      top:    { style: 'thin',   color: { rgb: 'C8B89A' } },
      bottom: { style: bottomStyle, color: { rgb: bottomColor } },
      left:   { style: isLeft  ? 'medium' : 'thin', color: { rgb: isLeft  ? '2A2520' : 'C8B89A' } },
      right:  { style: isRight ? 'medium' : 'thin', color: { rgb: isRight ? '2A2520' : 'C8B89A' } },
    });

    const cellStyle = (extraAlign, isLeft, isRight) => ({
      font: { name: FONT, sz: 10, color: greyFont ? { rgb: greyFont } : undefined },
      fill: greyFill ? { fgColor: { rgb: greyFill } } : undefined,
      alignment: extraAlign,
      border: baseBorder(isLeft, isRight),
    });

    // 日付列
    ws[XLSX.utils.encode_cell({r, c: COL.day})] = {
      v: row.isFirst ? row.dayStr : '', t: 's',
      s: cellStyle({ horizontal: 'center', vertical: 'top' }, true, false)
    };
    // 曜日列
    ws[XLSX.utils.encode_cell({r, c: COL.wd})] = {
      v: row.isFirst ? row.wdStr : '', t: 's',
      s: cellStyle({ horizontal: 'center', vertical: 'top' }, false, false)
    };
    // 精舎列
    ws[XLSX.utils.encode_cell({r, c: COL.temple})] = {
      v: row.isFirst ? row.tname : '', t: 's',
      s: cellStyle({ horizontal: 'center', vertical: 'top' }, false, false)
    };
    // 時間列
    ws[XLSX.utils.encode_cell({r, c: COL.time})] = {
      v: row.isFirst ? row.timeStr : '', t: 's',
      s: cellStyle({ horizontal: 'center', vertical: 'top' }, false, false)
    };
    // 法要名列
    ws[XLSX.utils.encode_cell({r, c: COL.ev})] = {
      v: row.isFirst ? row.evName : '', t: 's',
      s: cellStyle({ vertical: 'top', wrapText: true }, false, false)
    };
    // 名前列
    ws[XLSX.utils.encode_cell({r, c: COL.name})] = {
      v: row.name, t: 's',
      s: cellStyle({ vertical: 'center' }, false, false)
    };
    // 言語列
    ws[XLSX.utils.encode_cell({r, c: COL.lang})] = {
      v: row.language, t: 's',
      s: cellStyle({ horizontal: 'center', vertical: 'center' }, false, false)
    };
    // コメント列
    ws[XLSX.utils.encode_cell({r, c: COL.notes})] = {
      v: row.notes, t: 's',
      s: cellStyle({ vertical: 'center', wrapText: true }, false, true)
    };
  });

  // セル結合：日付・曜日・精舎・時間・法要名を同じ法要の行でマージ
  let mergeStart = R_START;
  rows.forEach((row, i) => {
    if (row.isLast) {
      const mergeEnd = R_START + i;
      if (mergeEnd > mergeStart) {
        [COL.day, COL.wd, COL.temple, COL.time, COL.ev].forEach(c => {
          merges.push({ s: { r: mergeStart, c }, e: { r: mergeEnd, c } });
        });
      }
      mergeStart = mergeEnd + 1;
    }
  });

  ws['!merges'] = merges;

  // 列幅
  ws['!cols'] = [
    { wch: 7  }, // 日付
    { wch: 5  }, // 曜日
    { wch: 12 }, // 精舎
    { wch: 7  }, // 時間
    { wch: 28 }, // 法要名
    { wch: 18 }, // 名前
    { wch: 12 }, // 言語
    { wch: 28 }, // コメント
  ];

  // 行高
  ws['!rows'] = [{ hpt: 20 }];
  rows.forEach((_, i) => { ws['!rows'][R_START + i] = { hpt: 18 }; });

  // 範囲
  ws['!ref'] = XLSX.utils.encode_range({
    s: { r: 0, c: 0 },
    e: { r: R_START + rows.length - 1, c: 7 }
  });

  const month = document.getElementById('hdr-period')?.textContent || '参座者一覧';
  XLSX.utils.book_append_sheet(wb, ws, '参座者一覧');
  XLSX.writeFile(wb, month + '_参座者一覧.xlsx');
}

function saveToDb(b, evLines, isUpdate) {
  const payload = {
    at:        b.at,
    name:      b.name,
    email:     b.email,
    language:  b.language,
    events:    evLines.join(' / '),
    event_ids: JSON.stringify(b.eventIds),
    notes:     b.notes || '',
    status:    isUpdate ? '更新' : '新規',
  };
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal',
  };
  // 既存レコード削除 → 新規追加 → 再読み込み
  fetch(SUPABASE_URL + '/rest/v1/reservations?email=eq.' + encodeURIComponent(b.email), {
    method: 'DELETE', headers,
  })
  .then(() => fetch(SUPABASE_URL + '/rest/v1/reservations', {
    method: 'POST', headers,
    body: JSON.stringify(payload),
  }))
  .then(res => {
    if (!res.ok) return res.text().then(t => { throw new Error(t); });
    console.log('Supabase: saved.');
    loadFromDb(); // 保存後に再読み込みして画面を更新
  })
  .catch(err => {
    console.warn('Supabase error:', err);
  });
}

function loadFromDb() {
  fetch(SUPABASE_URL + '/rest/v1/reservations?select=*&order=at.asc', {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
    },
  })
  .then(r => r.json())
  .then(rows => {
    if (!Array.isArray(rows)) return;
    bookings = rows.map(r => {
      let eventIds = [];
      try { eventIds = r.event_ids ? JSON.parse(r.event_ids) : []; } catch(e) {}
      return {
        id:       r.id || Date.now(),
        name:     r.name || '',
        email:    r.email || '',
        language: r.language || '',
        notes:    r.notes || '',
        events:   r.events || '',
        eventIds: eventIds,
        at:       r.at || '',
        status:   r.status || '新規',
      };
    });
    renderList();
    renderAdmin();
    console.log('Supabase: loaded ' + bookings.length + ' bookings.');
  })
  .catch(err => {
    console.warn('Supabase load error:', err);
  });
}

function renderMonthNav() {
  const nav = document.getElementById('month-nav');
  if (!nav || !MONTH_NAV.length) return;
  const sep = '<span style="color:rgba(255,255,255,0.15);font-size:0.6rem;">|</span>';
  const baseStyle = 'font-size:0.7rem;padding:3px 16px;letter-spacing:0.12em;font-family:\'Noto Serif JP\',\'Noto Serif SC\',serif;';
  nav.innerHTML = MONTH_NAV.map((item, i) => {
    const s = (i > 0 ? sep : '') + (item.href
      ? `<a href="${item.href}" style="${baseStyle}color:rgba(255,255,255,0.35);text-decoration:none;">${item.label}</a>`
      : `<span style="${baseStyle}color:rgba(200,175,130,0.9);">${item.label} ●</span>`);
    return s;
  }).join('');
}
